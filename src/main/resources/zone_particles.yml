# Zone particle styles. Set per-zone with: /rtpzone particles <zone_id> <style>
# Styles: NONE, OUTLINE, BEAM, SWIRL, PULSE, DUST_WALL
config-version: 1

default_style: "OUTLINE"

# Ticks between renders for active zones.
update_interval: 4

# Skip rendering when no player is within this horizontal distance of the zone center.
render_distance: 48

# Hard cap on particles spawned per zone per render.
max_particles_per_tick: 200

setup_preview:
  enabled: true
  update_interval: 3
  style: "OUTLINE"
  private: true

styles:

  # OUTLINE - wireframe along the boundary.
  OUTLINE:
    particle: "END_ROD"
    edge_step: 1.0
    ring_segments: 32
    cylinder_struts: 8
    blocks_marker_particles: 4
    speed: 0.0
    count: 1

  # BEAM - vertical beams at corners / ring points / blocks.
  BEAM:
    particle: "FIREWORK"
    beam_height: 6
    particles_per_beam: 8
    cylinder_beam_count: 8
    speed: 0.02
    count: 1

  # SWIRL - rotating helix around the zone.
  SWIRL:
    particle: "DUST"
    color: "#20B2AA"
    dust_size: 1.2
    rotation_speed: 0.18
    helix_points: 24
    helix_layers: 3
    layer_height: 0.8
    speed: 0.0
    count: 1

  # PULSE - expanding rings from the zone center.
  PULSE:
    particle: "DUST_COLOR_TRANSITION"
    color_from: "#20B2AA"
    color_to: "#7FFFD4"
    dust_size: 1.0
    pulse_count: 2
    ring_points: 32
    pulse_speed: 0.4
    speed: 0.0
    count: 1

  # DUST_WALL - solid wall along the zone boundary.
  DUST_WALL:
    particle: "DUST"
    color: "#FF8C00"
    dust_size: 0.8
    height_step: 1.5
    horizontal_step: 1.5
    speed: 0.0
    count: 1

  NONE:
    particle: "FLAME"
    speed: 0.0
    count: 0
