# ----------------------------------------------------------------
# JustRTP Configuration
# ----------------------------------------------------------------
config-version: 29
# ----------------------------------------------------------------

settings:
  # The time in seconds a player must wait before using /rtp again.
  # This can be bypassed with the permission: justrtp.cooldown.bypass
  cooldown: 30

  # The time in seconds a player must stand still before being teleported.
  # This can be bypassed with the permission: justrtp.delay.bypass
  delay: 3

  # The maximum number of times the plugin will try to find a safe location if the cache is empty.
  # Higher values may increase the chance of finding a location but can use more server resources.
  attempts: 25
  
  # Dimension-specific attempt counts (overrides default attempts)
  # Nether and End require more attempts due to complex terrain
  attempts_nether: 50  # Nether caves are harder to find
  attempts_end: 35     # End islands are scattered

  # Should the plugin check for region claims from other plugins (e.g., WorldGuard)?
  # If true, players will not be teleported into claimed areas.
  # Requires the respective plugin (e.g., WorldGuard) to be installed.
  respect_regions: true

  # Enable debug mode to print detailed information to the console.
  # This is useful for troubleshooting but can be very spammy.
  debug: false

  # Should the /rtp credits command require the "justrtp.command.credits" permission?
  # If false, anyone can use the command.
  credits_command_requires_permission: true
  
  # Optional: Force a server-wide default world for /rtp when no world is specified.
  # If empty (""), /rtp without a world will default to the player's current world (existing behaviour).
  # If set to a valid world name (e.g. "world"), /rtp will use that world as the default target.
  # Players with the permission "justrtp.bypass.default_world" will still default to their current world.
  # Example:
  #   settings.default_world: "world"
  default_world: ""
  
  # Should the plugin check for updates on startup?
  # If true, the plugin will check Spigot for newer versions.
  check_for_updates: true
  
  # Should OPs and admins be notified when they join if an update is available?
  # Requires check_for_updates to be enabled.
  notify_ops_on_update: true

# --- bStats Metrics ---
# bStats collects some anonymous data for plugin authors like server version, number of players, etc.
# To see what data is collected, go to https://bstats.org/what-is-collected/
# You can disable this here if you wish.
bstats:
  enabled: true

# --- World & Biome Teleport Control ---
rtp_settings:
  # This section controls which worlds players can teleport INTO.
  worlds:
    # Set the operation mode.
    # "BLACKLIST": Players can RTP into ALL worlds EXCEPT the ones listed below.
    # "WHITELIST": Players can ONLY RTP into the worlds listed below.
    mode: "BLACKLIST"

    # The list of worlds for the selected mode.
    list:
      - "example_world"
      - "example_world1"

  # This section controls which biomes players can land in.
  # A full list of valid biomes can be found here: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/block/Biome.html
  biomes:
    # Set the operation mode.
    # "BLACKLIST": Players can land in ALL biomes EXCEPT the ones listed below.
    # "WHITELIST": Players can ONLY land in the biomes listed below.
    mode: "BLACKLIST"

    # The list of biomes for the selected mode. By default, players won't land in oceans.
    list:
      - "OCEAN"
      - "DEEP_OCEAN"
      - "COLD_OCEAN"
      - "DEEP_COLD_OCEAN"
      - "LUKEWARM_OCEAN"
      - "DEEP_LUKEWARM_OCEAN"
      - "WARM_OCEAN"
      - "FROZEN_OCEAN"
      - "DEEP_FROZEN_OCEAN"

  # --- World Aliases ---
  # Define custom, shorter names for your worlds for use in commands.
  # Players can then use "/rtp <alias>" instead of the full world name.
  # Format: Alias: "RealWorldName"
  # Note: Aliases are case-insensitive.
  world_aliases:
    "End": "world_the_end"
    "Mining": "world_resource"

# --- World Type Configuration ---
# Override automatic world type detection for custom dimensions
# Valid Types: NORMAL (overworld), NETHER (Y < 127), THE_END (void worlds)
# Auto-detection: Plugin automatically detects based on World.Environment
# Manual config: Only needed for custom dimension names or override
#
# WARNING: For cross-server nether RTP, configure world_types on TARGET server!
# Example: /rtp lobby2:world_nether requires lobby2 to have world_nether: "NETHER"
#
# IMPORTANT: Add ALL your custom worlds here for best performance!
world_types:
  world: "NORMAL"
  world_nether: "NETHER"      # Standard nether (Y < 127 enforced)
  world_the_end: "THE_END"    # Standard end world
  # Example custom worlds (uncomment and adjust as needed):
  # plains: "NORMAL"          # Custom plains biome world
  # badlands: "NORMAL"        # Custom badlands biome world
  # snow: "NORMAL"            # Custom snow biome world
  # mushroom: "NORMAL"        # Custom mushroom biome world
  # custom_nether: "NETHER"   # Custom nether dimension
  # mining_world: "NORMAL"    # Custom mining/resource world

# --- Location Caching System ---
# This system dramatically improves performance by finding safe locations in advance.
# When a player uses /rtp, they get a pre-calculated location instantly. Highly recommended.
location_cache:
  # Enable the cache for instant teleports.
  enabled: true
  # --- Whitelist of Worlds to Cache ---
  # Only worlds listed here will have a location cache.
  # The names MUST EXACTLY match your world folder names.
  #
  # ⚠️ IMPORTANT: generate_chunks setting explained
  #
  #   generate_chunks: true (RECOMMENDED - Works everywhere)
  #     ✅ Works in both explored AND unexplored worlds
  #     ✅ Uses PaperLib's safe async chunk generation
  #     ✅ No chunk corruption - proper async generation
  #     ✅ Best for most servers (explored or new worlds)
  #     ✅ Allows RTP to work anywhere within your world border
  #
  #   generate_chunks: false (Pre-generated worlds only)
  #     ⚠️ Only works in already-explored/generated areas
  #     ⚠️ Will fail to find locations in unexplored areas
  #     ⚠️ Use only if you have fully pre-generated your world
  #     ⚠️ Not recommended unless you know what you're doing
  #
  # How it works with generate_chunks: true:
  #   - Plugin searches for safe RTP location
  #   - PaperLib.teleportAsync() safely generates chunks asynchronously
  #   - No corruption - uses Minecraft's proper generation system
  #   - Works in both explored and unexplored areas
  #   - Recommended for 99% of servers
  worlds:
    world:
      generate_chunks: true
    world_nether:
      generate_chunks: true
    # Example custom worlds (uncomment and add your worlds here):
    # plains:
    #   generate_chunks: true
    # badlands:
    #   generate_chunks: true
    # snow:
    #   generate_chunks: true    # ← CRITICAL: Must be true for custom biome worlds!
    # mushroom:
    #   generate_chunks: true

# --- Animation Settings ---
# Choose which animations from animations.yml to play.
# Set to "" (an empty string) to disable an animation.
animations:
  # The animation that loops while the player is waiting for the teleport delay.
  delay_animation: "swirling_vortex"
  # The animation that plays once the player has successfully arrived at their destination.
  success_animation: "nova_burst"

# --- Teleport Delay Settings ---
# Configure what cancels the teleport during the warmup period.
delay_settings:
  # Cancel the teleport if the player moves from their starting block.
  # This includes any movement, not just changing blocks.
  cancel_on_move: true
  # Cancel the teleport if the player takes or deals damage.
  cancel_on_combat: true

# --- RTP Zone Teleport Settings ---
# Configure how players are spread out when teleported from an RTP Zone.
# Players will be distributed in a circle/pattern around a randomly selected central point.
zone_teleport_settings:
  # The minimum distance (in blocks) between any two players after teleportation.
  # Lower values = players spawn closer together (good for team play).
  # Higher values = players spawn further apart (good for PvP arenas).
  # Recommended: 5-10 blocks for team zones, 15-30 blocks for PvP zones.
  min_spread_distance: 5
  
  # The maximum distance (in blocks) from the central point where players can spawn.
  # This defines the overall "spawn area" size for the group.
  # All players will spawn within this radius from the randomly chosen center.
  # Recommended: 15-50 blocks depending on your arena/zone size.
  max_spread_distance: 15

# --- First Join Teleport ---
# Automatically teleport a player the very first time they join the server.
first_join_rtp:
  enabled: false
  # The name of the world where the new player should be teleported.
  target_world: "world"

# --- Respawn Teleport ---
# Automatically teleport a player when they respawn after death.
respawn_rtp:
  enabled: false
  # If true, the RTP delay (warmup) will be skipped for respawn teleports.
  bypass_delay: true
  # A list of worlds where players should be randomly teleported on respawn.
  # An empty list [] means it's enabled in ALL worlds.
  worlds:
    - "world"
    - "world_nether"

# --- Spawn World Redirect ---
# Redirect /rtp commands from spawn world to another world (e.g., overworld).
# Useful when you want players to use /rtp from spawn but teleport to a different world.
spawn_world_redirect:
  # Enable spawn world redirect feature
  enabled: false
  # The name of your spawn world (where players type /rtp)
  spawn_world: "spawn"
  # The target world to teleport to (e.g., your main overworld)
  target_world: "world"
  # Optional: Send a message to the player when they are redirected
  notify_player: true

# --- Jump RTP Feature ---
# Allow players to teleport by jumping (double-jump or hold jump).
jump_rtp:
  # Enable the Jump RTP feature
  enabled: false
  # Cooldown between Jump RTP teleports (in seconds)
  cooldown: 60
  # List of worlds where Jump RTP is enabled
  enabled_worlds:
    - "world"
    - "world_nether"
  # Number of jumps required to trigger RTP (1 = single jump, 2 = double jump)
  jumps_required: 2
  # Time window in milliseconds for detecting multiple jumps (for double-jump detection)
  jump_time_window: 500

# --- RTP Near Player ---
# Teleport to a random safe location near a random online player in a world.
# Usage: /rtp nearplayer [world]
# Permission: justrtp.command.rtp.nearplayer
nearplayer:
  # Enable the Near Player RTP feature
  enabled: true
  # Minimum distance (in blocks) from the target player's location
  min_radius: 100
  # Maximum distance (in blocks) from the target player's location
  max_radius: 500
  # If true, the target player will NOT be notified that someone teleported near them
  silent: false
  # If true, the player executing the command can be selected as the target (excluded by default)
  allow_self: false

# --- Economy Settings (Requires Vault) ---
economy:
  # Enable charging players for using /rtp.
  enabled: false
  # The default cost for a random teleport. This can be overridden per-world or per-permission group.
  # Players with "justrtp.cost.bypass" are not charged.
  cost: 100.0
  # If true, players must type /rtp confirm before a costly teleport will proceed.
  require_confirmation: true

# --- Performance Settings ---
# Configure teleport processing to prevent lag on busy servers.
performance:
  # If true, teleport requests are added to a queue and processed sequentially.
  # This prevents server lag when many players use /rtp at the same time. Highly recommended.
  # If false, teleports are processed instantly and concurrently (can cause lag spikes).
  use_teleport_queue: true

  # How often (per second) the queue should be processed.
  # A higher number processes faster but may use more resources.
  # This only works if use_teleport_queue is true.
  queue_processing_rate: 5

  # How many players to teleport at once from the queue each time it is processed.
  # Increasing this can significantly speed up teleports on busy servers.
  queue_batch_size: 5

# --- Cross-Server RTP (Proxy) ---
# Requirements: Velocity/BungeeCord/Waterfall + MySQL (mysql.yml) on ALL servers
# Redis (redis.yml) is OPTIONAL but recommended for better performance
#
# ⚠️ IMPORTANT: Command Format Guide
# 
# Local RTP (same server):
#   /rtp                    - Current world
#   /rtp world_nether       - Specific world (NO server prefix)
#   /rtp world_the_end      - Another world (NO server prefix)
# 
# Cross-Server RTP (different server):
#   /rtp lobby2:world_nether  - world_nether on lobby2 server
#   /rtp lobby2               - Default world on lobby2
#   /rtp factions:world       - world on factions server
# 
# ❌ WRONG: /rtp lobby2:world_nether (when already on lobby2)
# ✓ CORRECT: /rtp world_nether (when on lobby2)
#
# 💡 TIP: Type /rtp help in-game for detailed guide!
proxy:
  # Set to true to enable cross-server /rtp functionality.
  # This requires a correctly configured mysql.yml on ALL Spigot/Paper servers.
  # Redis configuration (redis.yml) is OPTIONAL but recommended for optimal performance.
  # The plugin will work perfectly fine without Redis using MySQL + memory fallback.
  enabled: false

  # The name of THIS server as defined in your proxy's configuration (e.g., velocity.toml).
  # WARNING: THIS MUST BE SET ACCURATELY FOR PROXY FEATURES TO WORK - it is case-sensitive!
  # Example: If this is "lobby" in velocity.toml, set it to "lobby" here.
  this_server_name: "lobby"

  # If a player uses /rtp <server>, they are first sent to that server and then teleported.
  # If this is true, the teleport delay (warmup) will be skipped for players arriving from another server.
  cross_server_rtp_no_delay: true

  # If true, players will spawn directly at their RTP location instead of at server spawn first.
  # This prevents multiple players from briefly appearing at the same spawn point during cross-server teleports.
  instant_spawn_location: true
  
  # Maximum time (in seconds) to wait for cross-server location finding.
  # Increased to 90s to allow enough time for:
  #  - MySQL polling every 2 seconds
  #  - Target server finding safe location (up to 50 attempts for nether)
  #  - Network latency between servers
  # If location not found within this time, request is cancelled and cooldown reset.
  timeout_seconds: 90

  # A list of ALL servers that players can RTP to from this server.
  # These names must exactly match the server names in your proxy's configuration.
  servers:
    - "lobby2"
    - "world"
    - "factions"

# --- Redis Integration ---
# Redis provides high-performance caching and real-time cross-server communication.
# Configure redis.yml for detailed Redis settings.
redis:
  # Set to true to enable Redis integration for enhanced performance.
  # Redis will be used for cooldowns, delays, location cache, and cross-server data.
  # Falls back to memory storage if Redis is unavailable.
  enabled: false

  # Data types to store in Redis (can be individually controlled in redis.yml)
  storage-types:
    # Store player cooldowns in Redis for cross-server persistence
    cooldowns: true
    
    # Store teleport delays in Redis for cross-server coordination
    delays: true
    
    # Store location cache in Redis for improved performance
    location-cache: true
    
    # Store cross-server teleport requests in Redis for real-time communication
    teleport-requests: true
    
    # Store teleport queue in Redis for load balancing across servers
    teleport-queue: true

  # Performance settings
  performance:
    # Use Redis for real-time cross-server notifications
    enable-pubsub: true
    
    # Cache frequently accessed data locally to reduce Redis calls
    enable-local-cache: true
    
    # Local cache TTL in seconds
    local-cache-ttl: 30

  # Fallback configuration
  fallback:
    # Automatically fall back to memory storage if Redis is unavailable
    use-memory-fallback: true
    
    # Also fall back to MySQL for cross-server features if both Redis and memory fail
    use-mysql-fallback: true

  # --- RTP Zone Synchronization (Cross-Server Spawn Servers) ---
  # Synchronize RTP zones across multiple spawn servers so all servers share the same zones.
  # This is perfect for networks with multiple spawn/lobby servers that need identical zone configurations.
  zone_sync:
    enabled: false
    sync_interval: 10
    mode: "PULL"
    master_server: "lobby"
    storage: "BOTH"
    auto_reload: true
    notify_sync: true

  # Define user-friendly display names for your servers.
  # If a server name is not listed here, its technical name will be used.
  aliases:
    "world": "world"
    "factions": "<gradient:red:gold>Factions</gradient>"

# --- Visual & Audio Effects ---
# Customize titles, sounds, particles, and more after a successful teleport.
# All text fields use the MiniMessage format. Learn more: https://docs.advntr.dev/minimessage/format.html
# To disable a specific message (e.g., title), set its text to " ".
effects:
  title:
    enabled: true
    fade_in: 10
    stay: 40
    fade_out: 10
    main_title: "<gradient:#20B2AA:#7FFFD4>Teleported!</gradient>"
    subtitle: "<gray>You have arrived at a new location.</gray>"

  # --- Successful Teleport Feedback ---
  # Shown on the action bar (above health/food) when the player arrives.
  action_bar:
    enabled: true
    text: "<green>You have been randomly teleported!</green>"

  # This action bar is shown with a timer when a player is waiting for a cross-server RTP.
  queue_action_bar:
    enabled: true
    # Placeholders: 
    #   <server> - target server name
    #   <time> or <elapsed> - seconds elapsed
    #   <remaining> or <countdown> - seconds remaining
    #   <total> - total timeout seconds
    text: "<gray>Searching on <gradient:#20B2AA:#7FFFD4><server></gradient>... <dark_gray>| <gray>Time: <white><countdown>s</white>"

  # --- Warmup / Delay Feedback ---
  # Actionbar shown EVERY SECOND while the player is standing still awaiting teleportation.
  # This displays a countdown timer to the player.
  # NOTE: The message is primarily configured in messages.yml under 'teleport.delay'
  # This config.yml setting is used as a fallback if messages.yml is not configured.
  teleport_delay_bar:
    enabled: true
    # Placeholders:
    #   <time> - Remaining seconds (counts down: 3, 2, 1...)
    #   %prefix% - Prefix from messages.yml
    # Example: If delay is 5 seconds, this will show:
    #   "Teleporting in 5s... Don't move!"
    #   "Teleporting in 4s... Don't move!"
    #   "Teleporting in 3s... Don't move!" etc.
    # To customize this message, edit messages.yml -> teleport.delay
    text: "<yellow>Teleporting in <gold><time>s<yellow>... Don't move!"

  # Sound played EVERY SECOND during the warmup/delay period.
  # Creates an audible countdown effect for the player.
  # The pitch AUTOMATICALLY INCREASES as the timer reaches 0 for a premium "count-down" effect.
  teleport_delay_sound:
    enabled: true
    # Full list: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
    # Popular options:
    #   - BLOCK_NOTE_BLOCK_PLING (default - musical note)
    #   - ENTITY_EXPERIENCE_ORB_PICKUP (XP sound)
    #   - BLOCK_NOTE_BLOCK_BELL (bell sound)
    #   - UI_BUTTON_CLICK (click sound)
    name: "BLOCK_NOTE_BLOCK_PLING"
    
    # Volume of the sound. Range: 0.0 to 2.0 (Default: 1.0)
    # 0.0 = silent, 1.0 = normal, 2.0 = very loud
    volume: 1.0
    
    # Starting pitch of the sound. Range: 0.5 to 2.0 (Default: 1.0)
    # The pitch will AUTOMATICALLY INCREASE by +0.4 as countdown progresses
    # Example with pitch: 1.0 and 5 second delay:
    #   5s remaining: pitch 1.0
    #   4s remaining: pitch 1.1
    #   3s remaining: pitch 1.2
    #   2s remaining: pitch 1.3
    #   1s remaining: pitch 1.4
    # Lower values (0.5-0.8) = deeper sound
    # Higher values (1.2-2.0) = higher pitched sound
    pitch: 1.0
    
    # Dynamic pitch increase during countdown (Default: true)
    # When enabled, pitch AUTOMATICALLY INCREASES by +0.4 as countdown progresses
    # Set to false to keep the same pitch for all countdown sounds
    dynamic_pitch: true

  # This action bar is shown when a player's local RTP request is queued.
  in_queue_action_bar:
    enabled: true
    text: "<gray>You are in the queue... Teleporting soon!</gray>"

  boss_bar:
    enabled: true
    text: "<gradient:#20B2AA:#7FFFD4>JustRTP</gradient> <white><gray>Finding a new adventure!</gray>"
    color: GREEN # Available: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
    style: PROGRESS # Available: PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
    duration: 5 # Duration in seconds

  # Chat messages sent to the player on successful teleport.
  # Placeholders: <player>, <x>, <y>, <z>, <world>
  chat_message:
    enabled: true
    messages:
      - ""
      - "<dark_gray><gradient:#20B2AA:#7FFFD4>Wilderness Teleport</gradient>"
      - "<dark_gray>  <gray>World:</gray> <color:#7FFFD4><world>"
      - "<dark_gray>  <gray>Coordinates:</gray> <color:#7FFFD4><x><gray>, </gray><color:#7FFFD4><y><gray>, </gray><color:#7FFFD4><z>"
      - ""

  sound:
    enabled: true
    # Full list of sounds: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html
    name: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.2

  transition_effects:
    enabled: true
    # Effects to apply during the teleport delay. Format: "EFFECT_NAME:AMPLIFIER"
    # Amplifier is 0-indexed (e.g., 0 for level I, 1 for level II).
    effects:
      - "BLINDNESS:0"
      - "SLOW:2"

# --- Global RTP Zone Effects ---
# Configure the default effects for entering and leaving ALL RTP zones.
# These can be overridden per-zone in rtp_zones.yml.
zone_effects:
  on_enter:
    title:
      enabled: true
      fade_in: 5
      stay: 40
      fade_out: 10
      main_title: "<green>You have entered the queue!"
      subtitle: "<gray>The battle will begin soon."
    sound:
      enabled: true
      name: "BLOCK_NOTE_BLOCK_PLING"
      volume: 1.0
      pitch: 1.5
  on_leave:
    title:
      enabled: true
      fade_in: 5
      stay: 20
      fade_out: 5
      main_title: "<red>You have left the queue!"
      subtitle: ""
    sound:
      enabled: true
      name: "BLOCK_NOTE_BLOCK_PLING"
      volume: 1.0
      pitch: 0.8

# --- Command Disabling ---
# Worlds where the /rtp command is COMPLETELY disabled and cannot be executed AT ALL.
disabled_worlds:
  - "world_prison"
  - "spawn"

# Should the plugin send an error message when a player tries to use /rtp in a disabled world?
# If false, the command will silently fail with no message.
disabled_worlds_show_message: true

# A list of blocks that are considered unsafe to teleport ONTO.
blacklist_blocks:
  - "LAVA"
  - "WATER"
  - "CACTUS"
  - "FIRE"
  - "MAGMA_BLOCK"
  - "AIR"
  - "CAVE_AIR"

# Define custom teleport boundaries for specific worlds.
# IMPORTANT: max_radius should ALWAYS be smaller than half of your world border size.
# CRITICAL: Plugin enforces ABSOLUTE MAX of 10,000,000 blocks to prevent server crashes!
# Check your world border with /worldborder get
# WARNING: Extremely large radius values (>1 million) can cause chunk loading delays!
#
# ⚠️ IMPORTANT: Add ALL worlds from rtp_settings.worlds.list here!
#   Without custom_worlds config, plugin uses ENTIRE world border (can cause failures!)
custom_worlds:
  world:
    # Example: If your overworld border is 10,000 x 10,000, the max radius is 5000.
    max_radius: 5000
    min_radius: 100
    center_x: 0
    center_z: 0
    cost: 100.0
    
    # --- Radius-Based Pricing (Optional) ---
    # Charge different prices based on the maximum radius chosen by the player.
    # This cost is ADDED to the base cost above (or permission group cost).
    # Example: If cost is 100 and player chooses 15000 radius, total cost = 100 + 250 = 350
    # Players need the permission "justrtp.command.rtp.radius" to choose custom radii.
    radius_pricing:
      enabled: false  # Set to true to enable radius-based pricing
      tiers:
        tier1:
          max_radius: 5000   # If player chooses radius <= 5000
          cost: 0.0          # Add 0 to base cost (no extra charge)
        tier2:
          max_radius: 15000  # If player chooses radius <= 15000
          cost: 250.0        # Add 250 to base cost
        tier3:
          max_radius: 25000  # If player chooses radius <= 25000
          cost: 500.0        # Add 500 to base cost
        # The plugin will automatically choose the smallest tier that fits the player's radius.
        # If player chooses 12000 radius, they'll be charged tier2 (250).
        # You can add more tiers as needed.

  world_nether:
    # The Nether coordinates are 1/8th of the overworld. A 5000 overworld radius is ~625 in the Nether.
    # If your nether border is 1,250 x 1,250, the max radius is 625.
    max_radius: 625
    min_radius: 50
    center_x: 0
    center_z: 0
  world_the_end:
    # The End often has a smaller explorable area. Adjust as needed.
    max_radius: 2000
    min_radius: 500
    center_x: 0
    center_z: 0
  # Example custom biome worlds (uncomment and adjust as needed):
  # plains:
  #   max_radius: 5000
  #   min_radius: 100
  #   center_x: 0
  #   center_z: 0
  #   cost: 100.0
  # badlands:
  #   max_radius: 5000
  #   min_radius: 100
  #   center_x: 0
  #   center_z: 0
  #   cost: 100.0
  # snow:                    # ← Add your custom worlds here!
  #   max_radius: 5000       # Max distance from center
  #   min_radius: 100        # Min distance from center
  #   center_x: 0            # RTP center X coordinate
  #   center_z: 0            # RTP center Z coordinate
  #   cost: 0                # Economy cost (requires Vault)
  # mushroom:
  #   max_radius: 5000
  #   min_radius: 100
  #   center_x: 0
  #   center_z: 0
  #   cost: 100.0

# Define special settings for players with specific permissions (e.g., for VIP ranks).
# Lower priority numbers = higher priority (MVP overrides VIP settings)
# 
# PER-WORLD COOLDOWNS ARE SUPPORTED!
# You can configure different cooldowns, delays, and costs for each world within a permission group.
# This allows, for example, VIPs to have shorter cooldowns in the overworld but even shorter in the nether.
#
# Example configuration with per-world settings:
# permission_groups:
#   enabled: true
#   groups:
#     vip:
#       priority: 20
#       worlds:
#         world:
#           cooldown: 60      # 60 seconds cooldown in overworld
#           delay: 5
#           cost: 0.0
#         world_nether:
#           cooldown: 20      # Only 20 seconds in nether!
#           delay: 3
#           cost: 0.0
#         world_the_end:
#           cooldown: 10      # Only 10 seconds in the end!
#           delay: 2
#           cost: 0.0
#     mvp:
#       priority: 10          # Lower = higher priority
#       worlds:
#         world:
#           cooldown: 0       # No cooldown for MVPs
#           delay: 0          # Instant teleport
#           cost: 0.0
#           max_radius: 7500  # Can also set custom radius per world
#           min_radius: 500
#
# PlaceholderAPI Support:
# Use %justrtp_cooldown% for current world or %justrtp_cooldown_worldname% for specific world
# Examples:
#   %justrtp_cooldown%              - Cooldown for player's current world
#   %justrtp_cooldown_world_nether% - Cooldown for world_nether
#   %justrtp_cost_world%            - Cost for world named "world"
#   %justrtp_delay_world_the_end%   - Delay for world_the_end
permission_groups:
  enabled: true
  groups:
    vip:
      priority: 20
      worlds:
        world:
          cooldown: 15
          delay: 1
          cost: 0.0
    mvp:
      priority: 10
      worlds:
        world:
          cooldown: 0
          delay: 0
          max_radius: 7500
          min_radius: 500
          cost: 0.0

# --- RTP GUI Settings ---
