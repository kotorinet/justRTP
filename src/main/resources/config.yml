# --- Near Claim RTP Settings ---
# Innovative feature: Teleport near other players' claimed territories
# Supports: SimpleClaim, GriefPrevention, Lands (auto-detected)
# Usage: /rtp nearclaim
# Permission: justrtp.command.rtp.nearclaim
near_claim_rtp:
  # Enable the Near Claim RTP feature (default: false)
  enabled: false
  
  # Target world for near claim teleports
  # Leave empty ("") to use player's current world
  target_world: ""
  
  # Minimum distance from claim center (in blocks)
  # Players will spawn at least this far from the claim
  min_distance: 50
  
  # Maximum distance from claim center (in blocks)
  # Players will spawn at most this far from the claim
  max_distance: 200
  
  # Maximum attempts to find a safe location near a claim
  max_attempts: 10
  
  # Exclude player's own claims from selection
  # If true, players cannot teleport near their own claims
  exclude_own_claims: true
  
  # Cooldown between uses (in seconds)
  # Set to 0 to disable cooldown
  cooldown: 60
  
  # Economy cost for using near claim RTP
  # Requires Vault and an economy plugin
  # Set to 0.0 to make it free
  cost: 0.0

# --- Help Command Settings ---
# Configure the /rtp help command behavior
help_command:
  # If true, the help command output will only show commands the player has permission for.
  # If false, all commands are shown (original behavior).
  filter_by_permission: true

# --- RTP Zone Command Settings ---
# Control the /rtpzone command availability
rtpzone_command:
  # If false, the /rtpzone command will be completely disabled.
  # Players who try to use it will receive "no permission" or "unknown command".
  enabled: true